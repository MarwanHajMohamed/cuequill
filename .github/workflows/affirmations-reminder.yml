name: Affirmations reminder

# Fires every hour on the hour. The endpoint filters to users whose
# local time is currently in the 8am hour, so only they receive an
# email. Running hourly means one workflow covers every timezone in
# the world (24 fires/day = ~730/mo, well inside GitHub's free tier).
#
# workflow_dispatch is included so you can trigger a smoke test from
# the Actions tab without waiting for the top of the hour.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/affirmations-reminder
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Fail fast if the secret isn't configured — otherwise the
          # route just returns 401 and the failure mode looks like a
          # server bug.
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET is empty. Set it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          # -L follows Vercel's 3xx redirects (apex → www, http → https)
          # so the endpoint actually gets called rather than the job
          # painting green on a redirect response.
          # Hit the canonical host directly (www). Vercel redirects
          # apex → www, and curl drops Authorization on cross-host
          # redirects as a safety measure — which 401s the endpoint.
          curl -fLsS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://www.cuequill.com/api/cron/affirmations-reminder
