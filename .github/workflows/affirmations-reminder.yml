name: Affirmations reminder

# The hourly schedule is owned by Upstash QStash, which delivers on time
# and retries on failure — GitHub Actions' `schedule:` trigger runs
# best-effort and silently drops runs under load. QStash hits
# https://www.cuequill.com/api/cron/affirmations-reminder every hour; the
# endpoint filters to users whose local time is in the 8am hour, so one
# hourly fire covers every timezone.
#
# This workflow is kept for manual runs only: workflow_dispatch lets you
# trigger a smoke test from the Actions tab.
on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/affirmations-reminder
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Fail fast if the secret isn't configured — otherwise the
          # route just returns 401 and the failure mode looks like a
          # server bug.
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET is empty. Set it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          # -L follows Vercel's 3xx redirects (apex → www, http → https)
          # so the endpoint actually gets called rather than the job
          # painting green on a redirect response.
          # Hit the canonical host directly (www). Vercel redirects
          # apex → www, and curl drops Authorization on cross-host
          # redirects as a safety measure — which 401s the endpoint.
          #
          # Capture the status + body (instead of curl -f, which hides
          # the response) so a non-2xx prints WHY it failed in the log
          # — e.g. "RESEND_API_KEY is not configured." — rather than an
          # opaque exit code.
          resp=$(curl -sS -L -w $'\n%{http_code}' \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://www.cuequill.com/api/cron/affirmations-reminder)
          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -ge 400 ]; then
            echo "::error::affirmations-reminder returned HTTP $code"
            exit 1
          fi
